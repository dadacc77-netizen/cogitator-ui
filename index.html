<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COGITATOR ENGINE V1.2</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #FFF8E7; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 450px; background: white; padding: 30px; border-radius: 15px; border: 2px solid #F2B705; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { color: #333; text-align: center; }
        input { padding: 12px; margin: 10px 0; width: 100%; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .main-btn { cursor: pointer; background-color: #F2B705; border: none; border-radius: 8px; font-weight: bold; padding: 15px; width: 100%; transition: 0.3s; }
        #output { margin-top: 20px; padding: 15px; background: #fdfdfd; border-left: 5px solid #F2B705; min-height: 60px; border-radius: 4px; }
        .feedback-section { display: flex; gap: 10px; margin-top: 20px; opacity: 0.3; pointer-events: none; transition: 0.5s; }
        .feedback-section.active { opacity: 1; pointer-events: auto; }
        .btn-done { background-color: #4CAF50; color: white; flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .btn-fail { background-color: #f44336; color: white; flex: 1; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        
        /* 數據顯示區 */
        .dashboard { margin-top: 20px; padding: 10px; border-top: 1px solid #eee; }
        #behavior { font-weight: bold; color: #555; background: #fffbe6; padding: 8px; border-radius: 5px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <h2>COGITATOR ENGINE</h2>
    <input type="text" id="userInput" placeholder="現在的障礙是？">
    <button class="main-btn" onclick="send()">啟動行為導航</button>

    <div id="output">等待輸入狀態...</div>

    <div class="feedback-section" id="feedbackArea">
        <button class="btn-done" onclick="sendFeedback('DONE')">完成 (DONE)</button>
        <button class="btn-fail" onclick="sendFeedback('FAIL')">做不到 (FAIL)</button>
    </div>

    <div class="dashboard">
        <div id="behavior">🧠 行為偏好：計算中...</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwqMGvnFTDLNAxdADlrHDfbMNlvocXgB5JDjdsCCoWx8HuzC0kF5aC5dC3HQG22wrat/exec"; 
    let lastSteps = { step1: "", step2: "", type: "" };

    // 啟動載入
    window.onload = () => {
        loadBehavior();
    };

    function send() {
        const input = document.getElementById("userInput").value;
        if(!input) return;
        document.getElementById("output").innerHTML = "<em>運算中...</em>";
        const script = document.createElement("script");
        script.src = `${GAS_URL}?action=generate&input=${encodeURIComponent(input)}&callback=handleResponse`;
        document.body.appendChild(script);
    }

    function handleResponse(data) {
        lastSteps = { step1: data.step1, step2: data.step2, type: data.type };
        document.getElementById("output").innerHTML = `<strong>Step 1：</strong>${data.step1}<br><strong>Step 2：</strong>${data.step2}`;
        document.getElementById("feedbackArea").classList.add("active");
    }

    function sendFeedback(result) {
        const params = new URLSearchParams({
            action: "feedback", result: result, step1: lastSteps.step1, step2: lastSteps.step2, type: lastSteps.type, userId: "user_k9m2x", callback: "feedbackCallback"
        });
        const script = document.createElement("script");
        script.src = `${GAS_URL}?${params.toString()}`;
        document.body.appendChild(script);
    }

    function feedbackCallback(res) {
        if (res === "OK") {
            document.getElementById("feedbackArea").classList.remove("active");
            // 反饋成功後刷新統計與偏好
            setTimeout(loadBehavior, 500);
        }
    }

    // --- TASK V1.2：行為偏好顯示邏輯 ---

    function loadBehavior() {
        const script = document.createElement("script");
        script.src = `${GAS_URL}?action=behavior&userId=user_k9m2x&callback=handleBehavior`;
        document.body.appendChild(script);
    }

    function handleBehavior(data) {
        let maxType = "mobile";
        let maxValue = -1;

        for (let key in data) {
            if (data[key] > maxValue) {
                maxValue = data[key];
                maxType = key;
            }
        }

        let label = "分析中";
        if (maxType === "mobile") label = "📱 手機啟動型";
        if (maxType === "writing") label = "✍️ 書寫啟動型";
        if (maxType === "physical") label = "🧍 行動啟動型";

        document.getElementById("behavior").innerHTML = `🧠 行為偏好：${label}`;
    }
</script>
</body>
</html>
